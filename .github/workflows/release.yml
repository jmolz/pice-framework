name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pice
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pice
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: pice
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: pice
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: pice.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --version 0.2.5

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pice-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x64 binary
        uses: actions/download-artifact@v4
        with:
          name: pice-x86_64-unknown-linux-gnu
          path: ./bin

      - name: Verify binary runs
        run: |
          chmod +x ./bin/pice
          ./bin/pice --version
          ./bin/pice --help

  completions:
    name: Generate shell completions
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x64 binary
        uses: actions/download-artifact@v4
        with:
          name: pice-x86_64-unknown-linux-gnu
          path: ./bin

      - name: Generate completions
        run: |
          chmod +x ./bin/pice
          mkdir -p completions
          ./bin/pice completions bash > completions/pice.bash
          ./bin/pice completions zsh > completions/_pice
          ./bin/pice completions fish > completions/pice.fish

      - name: Upload completions artifact
        uses: actions/upload-artifact@v4
        with:
          name: completions
          path: completions/

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, completions, smoke-test]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin; do
            cd artifacts/pice-${target}
            chmod +x pice
            tar czf ../../release/pice-${target}.tar.gz pice
            cd ../..
          done
          cd artifacts/pice-x86_64-pc-windows-msvc
          zip ../../release/pice-x86_64-pc-windows-msvc.zip pice.exe
          cd ../..
          cp -r artifacts/completions release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/pice-*.tar.gz
            release/pice-*.zip
            release/completions/*

  npm-publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Copy binaries to NPM packages
        run: |
          cp artifacts/pice-aarch64-apple-darwin/pice npm/pice-darwin-arm64/pice
          cp artifacts/pice-x86_64-apple-darwin/pice npm/pice-darwin-x64/pice
          cp artifacts/pice-aarch64-unknown-linux-gnu/pice npm/pice-linux-arm64/pice
          cp artifacts/pice-x86_64-unknown-linux-gnu/pice npm/pice-linux-x64/pice
          cp artifacts/pice-x86_64-pc-windows-msvc/pice.exe npm/pice-win32-x64/pice.exe
          chmod +x npm/pice-darwin-arm64/pice npm/pice-darwin-x64/pice npm/pice-linux-arm64/pice npm/pice-linux-x64/pice

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in pice-darwin-arm64 pice-darwin-x64 pice-linux-arm64 pice-linux-x64 pice-win32-x64; do
            cd npm/${pkg}
            npm publish --access public
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/pice
          npm publish --access public
