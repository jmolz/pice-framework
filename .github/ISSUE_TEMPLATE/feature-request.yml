name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What would you like PICE to do?"
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: "Describe the problem this would solve or the workflow it would improve"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Have you tried any workarounds or alternative approaches?"
