[contract]
layer = "api"
tier = 2

[[contract.criteria]]
name = "Endpoints handle valid and invalid input correctly"
threshold = 8
validation = "Check request validation, type coercion, and rejection of malformed payloads"

[[contract.criteria]]
name = "Authentication and authorization are enforced"
threshold = 9
validation = "Verify protected endpoints reject unauthenticated requests and enforce role-based access"

[[contract.criteria]]
name = "Response format is consistent and documented"
threshold = 7
validation = "Check that responses follow the API schema, include correct status codes, and match documented types"

[[contract.criteria]]
name = "Error responses are structured and actionable"
threshold = 7
validation = "Verify error responses use consistent format with error codes, messages, and no leaked internals"
