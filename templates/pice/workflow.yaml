# PICE workflow — framework defaults
#
# This file is the baseline embedded in the `pice` binary. Projects override
# it at `.pice/workflow.yaml`, and individual developers may restrict (but
# never relax) project settings at `~/.pice/workflow.yaml`.
#
# Docs: PRDv2.md § Feature 4 and .claude/rules/workflow-yaml.md

schema_version: "0.2"

# Pipeline-wide defaults. Apply unless a layer override says otherwise.
defaults:
  tier: 2                   # 1=light, 2=dual-model, 3=adversarial agent team
  min_confidence: 0.90      # minimum correlated-Condorcet confidence to pass
  max_passes: 5             # hard ceiling; adaptive algorithms usually halt earlier
  model: sonnet             # primary workflow/evaluator model family
  budget_usd: 2.00          # per-layer cost cap; see cost_cap_behavior
  cost_cap_behavior: halt   # halt | warn | continue

phases:
  plan:
    description: "Generate layer-aware plan from feature request"
    output: .claude/plans/{feature-id}.md

  execute:
    description: "Implement per layer in dependency order"
    parallel: true          # independent layers run concurrently
    worktree_isolation: true
    retry:
      max_attempts: 3
      fresh_context: true

  evaluate:
    description: "Evaluate per layer with seam checks"
    parallel: true
    seam_checks: true
    adaptive_algorithm: bayesian_sprt   # bayesian_sprt | adts | vec | none
    # model_override: {}               # map of layer name -> model name
    #
    # Adaptive algorithm tuning (Phase 4) — uncomment to override defaults.
    # All values are PRDv2:1156–1165 baselines; the embedded defaults are
    # already correct for most teams.
    #
    # sprt:
    #   prior_alpha: 1.0          # Beta(α, β) prior; Beta(1,1) = uniform
    #   prior_beta: 1.0
    #   accept_threshold: 19.0    # ≈95% target — A in Wald's SPRT
    #   reject_threshold: 0.053   # 1/19 — B in Wald's SPRT
    #
    # adts:
    #   divergence_threshold: 2.0           # |claude − codex| on 0–10 scale
    #   max_divergence_escalations: 2       # Level1 + Level2 then Exhaust
    #
    # vec:
    #   entropy_floor: 0.01       # halt when ΔH per pass < this many bits

# Per-layer overrides. Empty by default — projects opt in.
layer_overrides: {}

# Review gates are disabled by framework default. Projects opt in via
# `.pice/workflow.yaml` with a `trigger` expression.
review:
  enabled: false
  timeout_hours: 24
  on_timeout: reject        # reject | approve | skip
  notification: stdout

# Seam verification — per-boundary static checks. See PRDv2 § Feature 6 and
# .claude/rules/stack-loops.md. Boundary keys use `A↔B` or `A<->B`.
# Example:
#
# seams:
#   "backend↔infrastructure":
#     - config_mismatch
#     - auth_handoff
#   "backend↔database":
#     - schema_drift
#   "api↔frontend":
#     - openapi_compliance
#
# Available check IDs (see `pice seam list`): config_mismatch, version_skew,
# openapi_compliance, auth_handoff, cascade_timeout, retry_storm,
# service_discovery, health_check, schema_drift, cold_start_order,
# network_topology, resource_exhaustion.
