# Preset: strict
# Intended for safety-critical codebases where every infrastructure and
# deployment change must be reviewed. Tier-3 everywhere, confidence ≥ 0.96.
#
# Phase 4 tuning: `max_passes: 8` with `min_confidence: 0.96` pushes toward
# the correlated-Condorcet ceiling (~0.966 — see
# `docs/research/convergence-analysis.md`). `adts` catches claude/codex
# divergence so the loop escalates compute (Level 2 → effort=xhigh)
# before halting on disagreement.

schema_version: "0.2"

defaults:
  tier: 3
  min_confidence: 0.96
  max_passes: 8
  model: opus
  # Opt-out until cost-telemetry providers ship (Pass-9 HIGH #1).
  budget_usd: 0.00
  cost_cap_behavior: halt

phases:
  execute:
    parallel: true
    worktree_isolation: true
    retry:
      max_attempts: 3
      fresh_context: true
  evaluate:
    parallel: true
    seam_checks: true
    # Phase 4 Pass-5 Codex Critical #3: standalone `adts` is temporarily
    # rejected at validation — it has no success path. Strict teams who want
    # divergence-triggered escalation will get it as an overlay on top of
    # `bayesian_sprt` in a follow-up release. Until then, `bayesian_sprt`
    # with a tight `min_confidence` is the closest substitute.
    adaptive_algorithm: bayesian_sprt

layer_overrides:
  infrastructure:
    tier: 3
    min_confidence: 0.97
    require_review: true
  deployment:
    tier: 3
    min_confidence: 0.97
    require_review: true

review:
  enabled: true
  trigger: "tier >= 3 OR layer == infrastructure OR layer == deployment"
  timeout_hours: 24
  on_timeout: reject
  notification: stdout
