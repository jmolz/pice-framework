# Preset: strict
# Intended for safety-critical codebases where every infrastructure and
# deployment change must be reviewed. Tier-3 everywhere, confidence ≥ 0.95.

schema_version: "0.2"

defaults:
  tier: 3
  min_confidence: 0.95
  max_passes: 10
  model: opus
  budget_usd: 1.50
  cost_cap_behavior: halt

phases:
  execute:
    parallel: true
    worktree_isolation: true
    retry:
      max_attempts: 3
      fresh_context: true
  evaluate:
    parallel: true
    seam_checks: true
    adaptive_algorithm: adts

layer_overrides:
  infrastructure:
    tier: 3
    min_confidence: 0.97
    require_review: true
  deployment:
    tier: 3
    min_confidence: 0.97
    require_review: true

review:
  enabled: true
  trigger: "tier >= 3 OR layer == infrastructure OR layer == deployment"
  timeout_hours: 24
  on_timeout: reject
  notification: stdout
