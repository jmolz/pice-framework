# Preset: brownfield
# Intended for legacy codebases where regression risk is the dominant concern.
# Higher confidence, more passes, larger budget to accommodate retries.

schema_version: "0.2"

defaults:
  tier: 2
  min_confidence: 0.92
  max_passes: 5
  model: sonnet
  # Opt-out until cost-telemetry providers ship (Pass-9 HIGH #1).
  budget_usd: 0.00
  cost_cap_behavior: halt

phases:
  execute:
    parallel: true
    worktree_isolation: true
    retry:
      max_attempts: 3
      fresh_context: true
  evaluate:
    parallel: true
    seam_checks: true
    # Phase 4 Pass-5 Codex Critical #3: standalone `adts` is temporarily
    # rejected at validation (no success path). Overlay design is tracked as
    # a follow-up; brownfield teams keep `bayesian_sprt` in the interim.
    adaptive_algorithm: bayesian_sprt

layer_overrides: {}

review:
  enabled: false
  timeout_hours: 24
  on_timeout: reject
  notification: stdout
